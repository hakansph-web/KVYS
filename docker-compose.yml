version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kvys-postgres
    environment:
      POSTGRES_DB: kvys
      POSTGRES_USER: ${DB_USER:-kvys}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kvys_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kvys} -d kvys"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kvys-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: kvys-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kvys-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: kvys-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio_secure_password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - kvys-network

  # KVYS API
  kvys-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kvys-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=kvys;Username=${DB_USER:-kvys};Password=${DB_PASSWORD:-kvys_secure_password}
      - Jwt__Secret=${JWT_SECRET:-your_very_secure_jwt_secret_key_at_least_32_characters}
      - Jwt__Issuer=KVYS
      - Jwt__Audience=KVYS-Users
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD:-redis_secure_password}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_USER:-minio_admin}
      - MinIO__SecretKey=${MINIO_PASSWORD:-minio_secure_password}
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kvys-network

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: kvys-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - kvys-api
    restart: unless-stopped
    networks:
      - kvys-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  kvys-network:
    driver: bridge
